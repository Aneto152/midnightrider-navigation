<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MidnightRider — Régate</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0a1628; color: #fff; min-height: 100vh; padding: 16px; }
h1 { text-align: center; font-size: 1.4em; margin-bottom: 16px; color: #4fc3f7; }
.section { background: #112240; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #1e3a5f; }
.section h2 { font-size: 0.9em; color: #4fc3f7; text-transform: uppercase; margin-bottom: 12px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
button { padding: 14px 8px; border: 2px solid #1e3a5f; border-radius: 10px; background: #0a1628; color: #fff; font-size: 0.9em; cursor: pointer; width: 100%; }
button.on { background: #1565c0; border-color: #4fc3f7; }
button.go { background: #1b5e20; border-color: #66bb6a; }
button.stop { background: #b71c1c; border-color: #ef5350; }
button.span2 { grid-column: span 2; padding: 18px; font-size: 1em; font-weight: bold; }
.timer { text-align: center; font-size: 3.5em; font-weight: bold; font-family: monospace; padding: 16px 0; }
.timer.warn { color: #ffb300; }
.timer.over { color: #ef5350; }
.status { display: flex; justify-content: space-between; background: #112240; border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 0.85em; color: #90caf9; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1565c0; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.9em; display: none; z-index: 999; }
.marks { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8em; }
.mark { padding: 4px 8px; background: #0a1628; border-radius: 6px; color: #90caf9; }
.mark.set { color: #66bb6a; }
.helm-timer { background: #0a1628; border-radius: 8px; padding: 8px; text-align: center; font-size: 0.8em; color: #90caf9; border: 1px solid #1e3a5f; }
.helm-timer.active { border-color: #4fc3f7; color: #fff; }
.helm-timer.warn { border-color: #ffb300; color: #ffb300; }
.ht-time { font-size: 1.3em; font-weight: bold; font-family: monospace; display: block; margin-top: 2px; }
</style>
</head>
<body>

<h1>⛵ MidnightRider</h1>

<div class="status">
  <span id="gps">GPS: —</span>
  <span id="clock">—</span>
</div>

<div class="section">
  <h2>⏱ Timer Départ</h2>
  <div class="timer" id="timer">05:00</div>
  <div class="grid4" style="margin-bottom:8px">
    <button onclick="setTimer(5)">5 min</button>
    <button onclick="setTimer(4)">4 min</button>
    <button onclick="setTimer(3)">3 min</button>
    <button onclick="setTimer(1)">1 min</button>
  </div>
  <div class="grid4">
    <button class="go" onclick="startTimer()">▶ Start</button>
    <button onclick="syncTimer()">🔄 Sync</button>
    <button class="stop" onclick="stopTimer()">■ Stop</button>
    <button onclick="resetTimer()">↺ Reset</button>
  </div>
</div>

<div class="section">
  <h2>📍 Ligne de départ</h2>
  <div class="grid2">
    <button id="btn-pin" onclick="markLine('pin')">📌 Bouée (Pin)</button>
    <button id="btn-boat" onclick="markLine('boat')">🚢 Comité</button>
  </div>
  <div class="marks">
    <span class="mark" id="mark-pin">Pin: —</span>
    <span class="mark" id="mark-boat">Comité: —</span>
  </div>
  <div id="line-distance" style="display:none;margin-top:10px;text-align:center">
    <div style="font-size:0.8em;color:#90caf9;margin-bottom:4px">Distance à la ligne</div>
    <div id="line-dist-value" style="font-size:2em;font-weight:bold;font-family:monospace">—</div>
    <div id="line-dist-side" style="font-size:0.85em;margin-top:2px">—</div>
  </div>
</div>

<div class="section">
  <h2>🔧 Mode</h2>
  <div class="grid2">
    <button id="mode-voile" onclick="setMode('voile')">⛵ Voile</button>
    <button id="mode-moteur" onclick="setMode('moteur')">🛥 Moteur</button>
  </div>
</div>

<div id="sails-section">
  <div class="section">
    <h2>⛵ Voile d'avant</h2>
    <div class="grid4">
      <button id="fs-J1" onclick="setForesail('J1')">J1</button>
      <button id="fs-J2" onclick="setForesail('J2')">J2</button>
      <button id="fs-J3" onclick="setForesail('J3')">J3</button>
      <button id="fs-Spi" onclick="setForesail('Spi')">Spi</button>
    </div>
  </div>
  <div class="section">
    <h2>⛵ Grande voile</h2>
    <div class="grid3">
      <button id="ms-gv" onclick="setMainsail('GV pleine')">GV pleine</button>
      <button id="ms-r1" onclick="setMainsail('1 ris')">1 ris</button>
      <button id="ms-r2" onclick="setMainsail('2 ris')">2 ris</button>
    </div>
  </div>
</div>

<div class="section">
  <h2>🧑‍✈️ Barreur</h2>
  <div class="grid4" style="margin-bottom:8px">
    <button id="helm-Denis" onclick="setHelmsman('Denis')">Denis</button>
    <button id="helm-AnSo" onclick="setHelmsman('Anne-Sophie')">Anne-Sophie</button>
    <button id="helm-Andrea" onclick="setHelmsman('Andrea')">Andrea</button>
    <button id="helm-Autre" onclick="setHelmsman('Autre')">Autre</button>
  </div>
  <div class="grid4" id="helm-timers">
    <div class="helm-timer" id="ht-Denis">Denis<br><span class="ht-time">0:00</span></div>
    <div class="helm-timer" id="ht-AnSo">Anne-So.<br><span class="ht-time">0:00</span></div>
    <div class="helm-timer" id="ht-Andrea">Andrea<br><span class="ht-time">0:00</span></div>
    <div class="helm-timer" id="ht-Autre">Autre<br><span class="ht-time">0:00</span></div>
  </div>
  <div style="text-align:right;margin-top:6px">
    <button style="width:auto;padding:6px 12px;font-size:0.75em" onclick="resetHelmTimers()">↺ Reset chrono</button>
  </div>
</div>

<div class="section">
  <h2>📝 Événements</h2>
  <div class="grid2">
    <button onclick="logEvent('tack','Virement')">↩ Virement</button>
    <button onclick="logEvent('gybe','Empannage')">↪ Empannage</button>
    <button onclick="logEvent('start','Départ')">🚦 Départ</button>
    <button onclick="logEvent('mark','Marque')">🏁 Marque</button>
    <button class="go span2" onclick="logEvent('finish','Arrivée')">🏆 ARRIVÉE</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- Ligne de départ ---
var linePin  = JSON.parse(localStorage.getItem('line-pin')  || 'null');
var lineBoat = JSON.parse(localStorage.getItem('line-boat') || 'null');

function toRad(d) { return d * Math.PI / 180; }

// Distance entre 2 points GPS en mètres (Haversine)
function distGPS(a, b) {
  var R = 6371000;
  var dLat = toRad(b.lat - a.lat);
  var dLon = toRad(b.lon - a.lon);
  var x = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) *
          Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// Distance signée du point P à la droite AB (positif = côté bâbord de la ligne)
function distToLine(A, B, P) {
  // Conversion en coordonnées locales (mètres)
  var latM = 111319.9;
  var lonM = 111319.9 * Math.cos(toRad((A.lat + B.lat) / 2));
  var ax = 0, ay = 0;
  var bx = (B.lon - A.lon) * lonM, by = (B.lat - A.lat) * latM;
  var px = (P.lon - A.lon) * lonM, py = (P.lat - A.lat) * latM;
  // Distance signée à la droite AB
  var len = Math.sqrt(bx*bx + by*by);
  if (len === 0) return 0;
  return (bx * (py - ay) - by * (px - ax)) / len;
}

function formatDist(m) {
  if (Math.abs(m) >= 1000) return (m/1000).toFixed(2) + ' nm';
  return Math.round(Math.abs(m)) + ' m';
}

function updateLineDistance(pos) {
  if (!linePin || !lineBoat || !pos.latitude) return;
  var P = {lat: pos.latitude, lon: pos.longitude};
  var dist = distToLine(linePin, lineBoat, P);
  var absDist = Math.abs(dist);
  var el = document.getElementById('line-dist-value');
  var side = document.getElementById('line-dist-side');
  var wrap = document.getElementById('line-distance');
  wrap.style.display = 'block';
  el.textContent = formatDist(absDist);
  if (absDist < 50) {
    el.style.color = '#ef5350'; // rouge - très proche
    side.textContent = '⚠️ Sur la ligne !';
  } else if (dist > 0) {
    el.style.color = '#66bb6a'; // vert - avant la ligne (bon côté)
    side.textContent = '✅ Avant la ligne';
  } else {
    el.style.color = '#ffb300'; // orange - derrière la ligne
    side.textContent = '⚠️ Derrière la ligne';
  }
}

// Restaurer les points de ligne au chargement
function restoreLineMarks() {
  if (linePin) {
    document.getElementById('mark-pin').textContent = 'Pin: ' + linePin.lat.toFixed(5) + ', ' + linePin.lon.toFixed(5);
    document.getElementById('mark-pin').className = 'mark set';
    document.getElementById('btn-pin').className = 'go';
  }
  if (lineBoat) {
    document.getElementById('mark-boat').textContent = 'Comité: ' + lineBoat.lat.toFixed(5) + ', ' + lineBoat.lon.toFixed(5);
    document.getElementById('mark-boat').className = 'mark set';
    document.getElementById('btn-boat').className = 'go';
  }
}

// --- Chrono barreurs ---
var helmIds = ['Denis', 'AnSo', 'Andrea', 'Autre'];
var helmNames = {'Denis':'Denis', 'AnSo':'Anne-Sophie', 'Andrea':'Andrea', 'Autre':'Autre'};
var helmSecs = {
  Denis:  parseInt(localStorage.getItem('hs-Denis')   || '0'),
  AnSo:   parseInt(localStorage.getItem('hs-AnSo')    || '0'),
  Andrea: parseInt(localStorage.getItem('hs-Andrea')  || '0'),
  Autre:  parseInt(localStorage.getItem('hs-Autre')   || '0')
};
var helmActive = localStorage.getItem('ha') || '';
var helmStart  = parseInt(localStorage.getItem('hst') || '0');

// Recalculer si un barreur était actif
if (helmActive && helmStart > 0) {
  var helmElapsed = Math.floor((Date.now() - helmStart) / 1000);
  helmSecs[helmActive] += helmElapsed;
  helmStart = Date.now(); // reset le start
  localStorage.setItem('hst', helmStart);
  localStorage.setItem('hs-' + helmActive, helmSecs[helmActive]);
}

function helmFmt(secs) {
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  var s = secs % 60;
  return (h > 0 ? h + ':' + pad(m) : m) + ':' + pad(s);
}

function updateHelmTimers() {
  helmIds.forEach(function(id) {
    var el = document.getElementById('ht-' + id);
    if (!el) return;
    var secs = helmSecs[id] + (helmActive === id && helmStart > 0 ? Math.floor((Date.now() - helmStart) / 1000) : 0);
    el.querySelector('.ht-time').textContent = helmFmt(secs);
    el.className = 'helm-timer' + (helmActive === id ? ' active' : '') + (secs >= 7200 ? ' warn' : '');
  });
}

function startHelmTimer(id) {
  // Sauvegarder le temps du barreur précédent
  if (helmActive && helmActive !== id && helmStart > 0) {
    helmSecs[helmActive] += Math.floor((Date.now() - helmStart) / 1000);
    localStorage.setItem('hs-' + helmActive, helmSecs[helmActive]);
  }
  helmActive = id;
  helmStart = Date.now();
  localStorage.setItem('ha', id);
  localStorage.setItem('hst', helmStart);
}

function resetHelmTimers() {
  helmIds.forEach(function(id) {
    helmSecs[id] = 0;
    localStorage.setItem('hs-' + id, '0');
  });
  helmActive = '';
  helmStart = 0;
  localStorage.setItem('ha', '');
  localStorage.setItem('hst', '0');
  updateHelmTimers();
  toast('↺ Chronos barreurs remis à zéro');
}

setInterval(updateHelmTimers, 1000);

// --- État persistant ---
var S = {
  timerSecs: parseInt(localStorage.getItem('ts') || '300'),
  timerRunning: localStorage.getItem('tr') === '1',
  timerStart: parseInt(localStorage.getItem('tst') || '0'),
  foresail: localStorage.getItem('fs') || '',
  mainsail: localStorage.getItem('ms') || '',
  helmsman: localStorage.getItem('hm') || '',
  mode: localStorage.getItem('md') || 'voile'
};

var timerInterval = null;

// Recalculer si le timer tournait
if (S.timerRunning && S.timerStart > 0) {
  var elapsed = Math.floor((Date.now() - S.timerStart) / 1000);
  S.timerSecs -= elapsed;
}

function save(key, val) { localStorage.setItem(key, val); }

function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, ms || 2000);
}

function post(path, data, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', path);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() { if (cb) cb(JSON.parse(xhr.responseText)); };
  xhr.send(JSON.stringify(data));
}

// --- Timer ---
function timerDisplay() {
  var s = S.timerSecs;
  var neg = s < 0;
  s = Math.abs(s);
  var m = Math.floor(s / 60), sc = s % 60;
  var str = (neg ? '-' : '') + pad(m) + ':' + pad(sc);
  var el = document.getElementById('timer');
  el.textContent = str;
  el.className = 'timer' + (S.timerSecs < 0 ? ' over' : S.timerSecs <= 60 ? ' warn' : '');
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function setTimer(m) {
  stopTimer();
  S.timerSecs = m * 60;
  save('ts', S.timerSecs);
  timerDisplay();
}

function resetTimer() {
  stopTimer();
  S.timerSecs = 300;
  save('ts', 300);
  timerDisplay();
}

function startTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (S.timerRunning) return;
  S.timerRunning = true;
  S.timerStart = Date.now();
  save('tr', '1');
  save('tst', S.timerStart);
  timerInterval = setInterval(function() {
    S.timerSecs--;
    save('ts', S.timerSecs);
    timerDisplay();
    if (S.timerSecs === 0) {
      logEvent('gun', 'Coup de canon');
      toast('🚦 DÉPART !', 4000);
    }
  }, 1000);
}

function stopTimer() {
  S.timerRunning = false;
  S.timerStart = 0;
  save('tr', '0');
  save('tst', '0');
  clearInterval(timerInterval);
  timerInterval = null;
}

function syncTimer() {
  var r = S.timerSecs % 60;
  if (r <= 30) S.timerSecs -= r;
  else S.timerSecs += (60 - r);
  if (S.timerSecs < 0) S.timerSecs = 0;
  save('ts', S.timerSecs);
  timerDisplay();
  toast('⏱ Sync → ' + Math.floor(S.timerSecs / 60) + 'min00');
}

// --- Ligne ---
function markLine(point) {
  post('/api/start_line', {point: point}, function(res) {
    var id = 'mark-' + point;
    var btn = document.getElementById('btn-' + point);
    if (res.ok) {
      var lat = res.lat ? res.lat.toFixed(5) : '?';
      var lon = res.lon ? res.lon.toFixed(5) : '?';
      var label = point === 'pin' ? 'Pin' : 'Comité';
      document.getElementById(id).textContent = label + ': ' + lat + ', ' + lon;
      document.getElementById(id).className = 'mark set';
      btn.className = 'go';
      // Sauvegarder le point
      var pt = {lat: res.lat, lon: res.lon};
      if (point === 'pin') { linePin = pt; localStorage.setItem('line-pin', JSON.stringify(pt)); }
      else { lineBoat = pt; localStorage.setItem('line-boat', JSON.stringify(pt)); }
      toast('📍 ' + label + ' marqué(e)');
    }
  });
}

// --- Mode ---
function setMode(mode) {
  S.mode = mode;
  save('md', mode);
  document.getElementById('mode-voile').className = mode === 'voile' ? 'on' : '';
  document.getElementById('mode-moteur').className = mode === 'moteur' ? 'stop on' : '';
  document.getElementById('sails-section').style.display = mode === 'moteur' ? 'none' : 'block';
  post('/api/event', {type: 'mode', note: mode}, null);
  toast(mode === 'moteur' ? '🛥 Moteur' : '⛵ Voile');
}

// --- Voiles ---
function setForesail(sail) {
  ['J1','J2','J3','Spi'].forEach(function(s) {
    document.getElementById('fs-' + s).className = '';
  });
  document.getElementById('fs-' + sail).className = 'on';
  S.foresail = sail;
  save('fs', sail);
  post('/api/sail', {sail: sail, type: 'foresail'}, function() { toast('⛵ Avant: ' + sail); });
}

function setMainsail(sail) {
  ['ms-gv','ms-r1','ms-r2'].forEach(function(id) {
    document.getElementById(id).className = '';
  });
  var map = {'GV pleine': 'ms-gv', '1 ris': 'ms-r1', '2 ris': 'ms-r2'};
  document.getElementById(map[sail]).className = 'on';
  S.mainsail = sail;
  save('ms', sail);
  post('/api/sail', {sail: sail, type: 'mainsail'}, function() { toast('⛵ GV: ' + sail); });
}

// --- Barreur ---
function setHelmsman(name) {
  ['Denis','AnSo','Andrea','Autre'].forEach(function(id) {
    document.getElementById('helm-' + id).className = '';
  });
  var map = {'Denis': 'Denis', 'Anne-Sophie': 'AnSo', 'Andrea': 'Andrea', 'Autre': 'Autre'};
  var id = map[name];
  document.getElementById('helm-' + id).className = 'on';
  S.helmsman = name;
  save('hm', name);
  startHelmTimer(id);
  post('/api/helmsman', {name: name}, function() { toast('🧑‍✈️ ' + name); });
}

// --- Événements ---
function logEvent(type, label) {
  post('/api/event', {type: type, note: label}, function() { toast('✅ ' + label); });
}

// --- Status bar ---
function updateStatus() {
  var now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/position');
  xhr.onload = function() {
    try {
      var pos = JSON.parse(xhr.responseText);
      if (pos.latitude) {
        document.getElementById('gps').textContent =
          pos.latitude.toFixed(4) + '° ' + pos.longitude.toFixed(4) + '°';
        updateLineDistance(pos);
      }
    } catch(e) {}
  };
  xhr.send();
}

// --- Restaurer l'état ---
function restoreState() {
  timerDisplay();
  setMode(S.mode);
  if (S.foresail) setForesail(S.foresail);
  if (S.mainsail) setMainsail(S.mainsail);
  if (S.helmsman) setHelmsman(S.helmsman);
  if (S.timerRunning) {
    S.timerRunning = false; // reset pour permettre startTimer
    startTimer();
  }
}

setInterval(updateStatus, 1000);
updateStatus();
restoreState();
updateHelmTimers();
restoreLineMarks();
</script>
</body>
</html>
