<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MidnightRider — Vent LIS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0a1628; color: #fff; padding: 12px; }
h1 { text-align: center; font-size: 1.3em; color: #4fc3f7; margin-bottom: 4px; }
.updated { text-align: center; font-size: 0.75em; color: #546e7a; margin-bottom: 12px; }
.zone-title { font-size: 0.75em; color: #4fc3f7; text-transform: uppercase; letter-spacing: 1px; margin: 12px 0 6px; padding-left: 4px; border-left: 3px solid #4fc3f7; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.card {
  background: #112240;
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid #1e3a5f;
  position: relative;
}
.card.marine { border-color: #0277bd; }
.card.asos { border-color: #37474f; opacity: 0.85; }
.card-name { font-size: 0.7em; color: #90caf9; margin-bottom: 4px; display: flex; justify-content: space-between; }
.card-name .tag { font-size: 0.75em; padding: 1px 5px; border-radius: 4px; background: #0277bd; }
.card-name .tag.asos-tag { background: #37474f; }
.wind-main { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.wind-arrow { font-size: 1.6em; transition: transform 0.5s; }
.wind-speed { font-size: 1.5em; font-weight: bold; font-family: monospace; }
.wind-unit { font-size: 0.65em; color: #90caf9; }
.wind-details { display: flex; gap: 10px; font-size: 0.75em; color: #90caf9; flex-wrap: wrap; }
.gust { color: #ffb300; }
.pres { color: #80cbc4; }
.trend-up { color: #ef5350; }
.trend-dn { color: #66bb6a; }
.nodata { color: #546e7a; font-style: italic; font-size: 0.85em; text-align: center; padding: 8px; }
.diff-bar {
  background: #0d1f35;
  border-radius: 10px;
  padding: 10px 14px;
  margin: 10px 0;
  border: 1px solid #1e3a5f;
}
.diff-bar h3 { font-size: 0.8em; color: #4fc3f7; margin-bottom: 8px; }
.diff-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8em; margin-bottom: 6px; }
.diff-val { font-family: monospace; font-weight: bold; }
.diff-val.pos { color: #66bb6a; }
.diff-val.neg { color: #ef5350; }
.diff-val.neu { color: #90caf9; }
.history { background: #0d1f35; border-radius: 10px; padding: 10px 14px; margin-top: 10px; border: 1px solid #1e3a5f; }
.history h3 { font-size: 0.8em; color: #4fc3f7; margin-bottom: 8px; }
.hist-table { width: 100%; font-size: 0.75em; border-collapse: collapse; }
.hist-table th { color: #546e7a; text-align: left; padding: 2px 6px; }
.hist-table td { padding: 3px 6px; border-bottom: 1px solid #1e3a5f; }
.refresh-btn { display: block; width: 100%; padding: 12px; margin-top: 12px; background: #1565c0; border: none; border-radius: 10px; color: white; font-size: 0.9em; cursor: pointer; }
.loading { text-align: center; color: #546e7a; padding: 20px; }
.disclaimer { font-size: 0.7em; color: #546e7a; text-align: center; margin-top: 8px; font-style: italic; }
</style>
</head>
<body>

<h1>⛵ Vent LIS</h1>
<div class="updated" id="updated">Chargement...</div>

<div id="content"><div class="loading">⏳ Récupération des données...</div></div>

<button class="refresh-btn" onclick="loadAll()">🔄 Rafraîchir</button>
<div class="disclaimer">⚠️ Stations terrestres (ASOS) : vent sous-estimé vs mer (obstacle, friction). Utiliser avec discernement.</div>

<script>

// Stations LIS organisées par zone géographique
var STATIONS = [
  // --- Bouées marines NDBC/NOAA dans et autour du LIS ---
  { id: 'NWPR1',  name: 'Newport RI',         type: 'marine', zone: 'EST — Rhode Island',    lat: 41.50, lon: -71.33 },
  { id: 'PTCR1',  name: 'Pt Judith RI',        type: 'marine', zone: 'EST — Rhode Island',    lat: 41.36, lon: -71.48 },
  { id: '44025',  name: 'Offshore SE LI',       type: 'marine', zone: 'SUD — Large Atlantique', lat: 40.25, lon: -73.17 },
  { id: '44017',  name: 'Montauk Point',        type: 'marine', zone: 'EST — Long Island',     lat: 40.69, lon: -72.05 },
  { id: '44022',  name: 'Block Island',         type: 'marine', zone: 'EST — Rhode Island',    lat: 41.14, lon: -71.57 },
  { id: '44040',  name: 'W. Long Island Sound', type: 'marine', zone: 'LIS OUEST',             lat: 40.96, lon: -73.58 },
  // --- Stations ASOS côté Connecticut ---
  { id: 'KBDR',   name: 'Bridgeport CT',        type: 'asos',   zone: 'CT — Côte Nord',       lat: 41.16, lon: -73.13 },
  { id: 'KHVN',   name: 'New Haven CT',         type: 'asos',   zone: 'CT — Côte Nord',       lat: 41.26, lon: -72.89 },
  { id: 'KGON',   name: 'New London CT',        type: 'asos',   zone: 'CT — Côte Nord Est',   lat: 41.33, lon: -72.04 },
  { id: 'KOXC',   name: 'Oxford CT',            type: 'asos',   zone: 'CT — Intérieur',       lat: 41.47, lon: -73.13 },
  // --- Stations ASOS côté Long Island ---
  { id: 'KISP',   name: 'Islip (MacArthur) LI', type: 'asos',   zone: 'LI — Côte Sud',        lat: 40.79, lon: -73.10 },
  { id: 'KFOK',   name: 'Westhampton LI',       type: 'asos',   zone: 'LI — Est',             lat: 40.84, lon: -72.63 },
  { id: 'KHWV',   name: 'Shirley LI',           type: 'asos',   zone: 'LI — Côte Sud',        lat: 40.82, lon: -72.87 },
  { id: 'KJFK',   name: 'JFK NY',               type: 'asos',   zone: 'LI — Ouest',           lat: 40.63, lon: -73.78 },
  { id: 'KLGA',   name: 'LaGuardia NY',         type: 'asos',   zone: 'LI — Ouest',           lat: 40.77, lon: -73.87 },
  // --- Rhode Island / Est ---
  { id: 'KPVD',   name: 'Providence RI',        type: 'asos',   zone: 'EST — Rhode Island',   lat: 41.72, lon: -71.43 },
  { id: 'KUUU',   name: 'Newport RI (aéro)',    type: 'asos',   zone: 'EST — Rhode Island',   lat: 41.53, lon: -71.28 },
];

var cache = {};
var history = {};

function mps2kts(v) { return v != null ? (v * 1.94384).toFixed(1) : null; }
function deg2compass(d) {
  if (d == null) return '?';
  var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  return dirs[Math.round(d / 22.5) % 16];
}
function windArrow(deg) {
  if (deg == null) return '?';
  return '<span style="display:inline-block;transform:rotate(' + (deg+180) + 'deg)">↑</span>';
}

async function fetchNDBC(id) {
  try {
    var r = await fetch('/api/ndbc/' + id);
    return await r.json();
  } catch(e) { return null; }
}

async function fetchASOS(id) {
  try {
    var r = await fetch('/api/asos/' + id);
    return await r.json();
  } catch(e) { return null; }
}

function renderCard(stn, data) {
  var marine = stn.type === 'marine';
  if (!data || data.error) {
    return '<div class="card ' + (marine ? 'marine' : 'asos') + '">' +
      '<div class="card-name"><span>' + stn.name + ' (' + stn.id + ')</span>' +
      '<span class="tag ' + (marine ? '' : 'asos-tag') + '">' + (marine ? '⚓ Bouée' : '🏔 ASOS') + '</span></div>' +
      '<div class="nodata">Données indisponibles</div></div>';
  }
  var spd = mps2kts(data.windSpeed);
  var gst = mps2kts(data.windGust);
  var dir = data.windDir;
  var pres = data.pressure ? data.pressure.toFixed(1) : null;
  var ptdy = data.pressureTendency;
  var trendIcon = ptdy != null ? (ptdy > 0 ? '<span class="trend-up">↑' + Math.abs(ptdy).toFixed(1) + '</span>' : '<span class="trend-dn">↓' + Math.abs(ptdy).toFixed(1) + '</span>') : '';

  return '<div class="card ' + (marine ? 'marine' : 'asos') + '">' +
    '<div class="card-name"><span>' + stn.name + ' (' + stn.id + ')</span>' +
    '<span class="tag ' + (marine ? '' : 'asos-tag') + '">' + (marine ? '⚓ Bouée' : '🏔 ASOS') + '</span></div>' +
    '<div class="wind-main">' +
    '<div class="wind-arrow">' + (dir != null ? windArrow(dir) : '?') + '</div>' +
    '<div>' +
    '<span class="wind-speed">' + (spd || '—') + '</span><span class="wind-unit"> kts</span><br>' +
    '<span style="font-size:0.75em;color:#90caf9">' + deg2compass(dir) + ' (' + (dir != null ? dir + '°' : '?') + ')</span>' +
    '</div></div>' +
    '<div class="wind-details">' +
    (gst ? '<span class="gust">Rafale: ' + gst + 'kts</span>' : '') +
    (pres ? '<span class="pres">P: ' + pres + 'hPa ' + trendIcon + '</span>' : '') +
    '</div></div>';
}

function renderDiffs() {
  // Comparaisons tactiques clés
  var diffs = [];
  var ct = ['KBDR','KHVN','KGON'];
  var li = ['KISP','KFOK','KJFK'];
  var est = ['NWPR1','PTCR1','44022'];
  var ouest = ['44040','KLGA'];

  function avgSpd(ids) {
    var vals = ids.map(function(id) {
      return cache[id] && cache[id].windSpeed != null ? parseFloat(mps2kts(cache[id].windSpeed)) : null;
    }).filter(function(v) { return v != null; });
    if (!vals.length) return null;
    return vals.reduce(function(a,b){return a+b;},0) / vals.length;
  }

  function avgDir(ids) {
    var vals = ids.map(function(id) {
      return cache[id] && cache[id].windDir != null ? cache[id].windDir : null;
    }).filter(function(v) { return v != null; });
    if (!vals.length) return null;
    // Moyenne circulaire
    var sinSum = vals.reduce(function(s,d){return s+Math.sin(d*Math.PI/180);},0);
    var cosSum = vals.reduce(function(s,d){return s+Math.cos(d*Math.PI/180);},0);
    return (Math.atan2(sinSum/vals.length, cosSum/vals.length) * 180 / Math.PI + 360) % 360;
  }

  var ctSpd = avgSpd(ct), liSpd = avgSpd(li);
  var estSpd = avgSpd(est), ouestSpd = avgSpd(ouest);
  var ctDir = avgDir(ct), liDir = avgDir(li);

  var html = '<div class="diff-bar"><h3>📊 Comparaisons tactiques</h3>';

  if (ctSpd != null && liSpd != null) {
    var diff = (ctSpd - liSpd).toFixed(1);
    var cls = diff > 0.5 ? 'pos' : diff < -0.5 ? 'neg' : 'neu';
    html += '<div class="diff-row"><span>CT vs LI (force)</span><span class="diff-val ' + cls + '">' +
      (diff > 0 ? '+' : '') + diff + ' kts</span></div>';
  }
  if (estSpd != null && ouestSpd != null) {
    var diff2 = (estSpd - ouestSpd).toFixed(1);
    var cls2 = diff2 > 0.5 ? 'pos' : diff2 < -0.5 ? 'neg' : 'neu';
    html += '<div class="diff-row"><span>Est vs Ouest (force)</span><span class="diff-val ' + cls2 + '">' +
      (diff2 > 0 ? '+' : '') + diff2 + ' kts</span></div>';
  }
  if (ctDir != null && liDir != null) {
    var angDiff = ((ctDir - liDir + 540) % 360) - 180;
    var cls3 = Math.abs(angDiff) > 15 ? 'pos' : 'neu';
    html += '<div class="diff-row"><span>Écart cap CT vs LI</span><span class="diff-val ' + cls3 + '">' +
      (angDiff > 0 ? '+' : '') + Math.round(angDiff) + '°</span></div>';
  }

  html += '</div>';
  return html;
}

async function loadAll() {
  document.getElementById('updated').textContent = 'Mise à jour...';
  var promises = STATIONS.map(async function(stn) {
    var fn = stn.type === 'marine' ? fetchNDBC : fetchASOS;
    var data = await fn(stn.id);
    if (data && !data.error) cache[stn.id] = data;
    return { stn: stn, data: data };
  });
  var results = await Promise.all(promises);

  // Grouper par zone
  var zones = {};
  results.forEach(function(r) {
    var z = r.stn.zone;
    if (!zones[z]) zones[z] = [];
    zones[z].push(r);
  });

  var html = renderDiffs();

  Object.keys(zones).sort().forEach(function(zone) {
    html += '<div class="zone-title">' + zone + '</div>';
    html += '<div class="grid">';
    zones[zone].forEach(function(r) {
      html += renderCard(r.stn, r.data);
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
  document.getElementById('updated').textContent = 'Mis à jour: ' + new Date().toLocaleTimeString('fr-FR');
}

loadAll();
setInterval(loadAll, 300000); // Refresh toutes les 5 minutes
</script>
</body>
</html>
