services:

  # ─────────────────────────────────────────
  # InfluxDB v2.8
  # ─────────────────────────────────────────
  influxdb:
    image: influxdb:2.8
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  # ─────────────────────────────────────────
  # Grafana v12.3.1
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.3.1
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    volumes:
      - grafana-data:/var/lib/grafana
      - grafana-config:/etc/grafana
      - ./grafana-custom.ini:/etc/grafana/provisioning/grafana.ini
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana-dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SERVER_HTTP_PORT=3001
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_X_FRAME_OPTIONS=SAMEORIGIN
    depends_on:
      - influxdb

  # ─────────────────────────────────────────
  # Astronomical Data (sun/moon/tides)
  # ─────────────────────────────────────────
  astronomical:
    build:
      context: .
      dockerfile: astronomical/Dockerfile
    container_name: astronomical
    restart: unless-stopped
    network_mode: host
    environment:
      - LAT=41.0534
      - LON=-73.5387
      - NOAA_STATION=8467150
      - INFLUX_URL=http://localhost:8086
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=MidnightRider
      - INFLUX_BUCKET=midnight_rider
    depends_on:
      - influxdb

  # ─────────────────────────────────────────
  # Signal K (2026-04-22: via Kplex, not direct USB)
  # network_mode: host est nécessaire pour :
  #   - accès à Kplex via TCP localhost:10110 ✅
  #   - mDNS / discovery réseau
  #   - Pas d'accès direct USB (Kplex gère)
  # ─────────────────────────────────────────
  signalk:
    image: signalk/signalk-server:latest
    container_name: signalk
    restart: unless-stopped
    network_mode: host
    group_add:
      - "46"   # plugdev — accès ports série USB
      - "20"   # dialout
    environment:
      - ALLOW_READONLY=true
    volumes:
      - signalk-data:/home/node/.signalk
    # USB removed: Kplex handles /dev/ttyUSB0 (WIT)
    # Signal K connects to Kplex TCP:10110
    # YDWG-02 NMEA2000 (if needed, uncomment)
    # devices:
    #   - /dev/ttyACM0:/dev/ttyACM0
    depends_on:
      - influxdb
      - astronomical

  # ─────────────────────────────────────────
  # Regatta Server (race planning & weather)
  # ─────────────────────────────────────────
  regatta:
    image: python:3.11-slim
    container_name: regatta
    restart: unless-stopped
    network_mode: host
    working_dir: /app
    volumes:
      - ./regatta:/app
      - ./:/repo
    command: python server.py
    environment:
      - INFLUX_TOKEN=${INFLUXDB_TOKEN}
    env_file:
      - .env
    depends_on:
      - influxdb

# Volumes externes — déjà créés et remplis avec les données migrées
volumes:
  influxdb-data:
    external: true
  influxdb-config:
    external: true
  grafana-data:
    external: true
  grafana-config:
    external: true
  signalk-data:
    external: true
