<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
        }

        .top-bar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            height: 60px;
            position: relative;
            z-index: 100;
        }

        .dashboard-title {
            color: #00d4ff;
            font-size: 1.3em;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 255, 0.2));
            border: 1px solid rgba(0, 212, 255, 0.4);
            color: #00d4ff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 153, 255, 0.3));
            border-color: rgba(0, 212, 255, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .home-btn {
            background: linear-gradient(135deg, rgba(0, 153, 255, 0.3), rgba(0, 99, 255, 0.3));
            border: 1px solid rgba(0, 153, 255, 0.5);
        }

        .home-btn:hover {
            background: linear-gradient(135deg, rgba(0, 153, 255, 0.5), rgba(0, 99, 255, 0.5));
            border-color: rgba(0, 153, 255, 0.7);
        }

        .fullscreen-toggle {
            color: #a0aec0;
            font-size: 0.85em;
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #1a1a2e;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #a0aec0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="dashboard-title" id="title">Loading...</div>
        <div class="nav-buttons">
            <button class="fullscreen-toggle" id="fullscreenBtn" title="Toggle Fullscreen (F or double-tap)">
                ⛶ Fullscreen
            </button>
            <button class="home-btn" id="homeBtn" title="Back to Dashboard Menu">
                ⬅ Menu
            </button>
        </div>
    </div>

    <div class="iframe-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Loading dashboard...</p>
        </div>
        <iframe id="dashboardFrame" style="display:none;"></iframe>
    </div>

    <script>
        // Get URL parameters
        const params = new URLSearchParams(window.location.search);
        const uid = params.get('uid') || 'cockpit-main';
        const name = params.get('name') || 'Dashboard';

        // Update title
        document.getElementById('title').textContent = `⛵ ${name}`;

        // Kiosk mode URL (no menu, no authentication needed)
        const grafanaUrl = window.location.origin;
        const iframeUrl = `${grafanaUrl}/d/${uid}?kiosk`;

        // Set iframe source
        const frame = document.getElementById('dashboardFrame');
        frame.src = iframeUrl;
        frame.style.display = 'block';
        document.getElementById('loading').style.display = 'none';

        // Home button
        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = 'dashboard-portal.html';
        });

        // Fullscreen toggle
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
                fullscreenBtn.textContent = '⛶ Exit Fullscreen';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ Fullscreen';
            }
        }

        // Double-tap to fullscreen (iPad)
        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                toggleFullscreen();
            }
            lastTap = currentTime;
        });

        // Keyboard shortcut (F for fullscreen)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });

        // Hide top bar after 3 seconds of inactivity (optional)
        let hideTimeout;
        const topBar = document.querySelector('.top-bar');

        function resetHideTimer() {
            clearTimeout(hideTimeout);
            topBar.style.opacity = '1';
            hideTimeout = setTimeout(() => {
                if (document.fullscreenElement) {
                    topBar.style.opacity = '0.2';
                    topBar.style.transition = 'opacity 0.5s ease';
                }
            }, 5000);
        }

        document.addEventListener('mousemove', resetHideTimer);
        document.addEventListener('touchstart', resetHideTimer);
        document.addEventListener('click', resetHideTimer);

        resetHideTimer();
    </script>
</body>
</html>
