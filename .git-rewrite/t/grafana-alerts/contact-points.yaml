# Grafana Contact Points Configuration for MidnightRider
# Notification channels for alerts

apiVersion: 1

contactPoints:
  - name: "Telegram - Denis"
    uid: "telegram_denis"
    type: "telegram"
    settings:
      bottoken: "${TELEGRAM_BOT_TOKEN}"  # Set via environment variable
      chatid: "${TELEGRAM_CHAT_ID}"       # Set via environment variable
      parse_mode: "markdown"
    disableResolveMessage: false
    provenance: "api"

  - name: "Telegram - Crew"
    uid: "telegram_crew"
    type: "telegram"
    settings:
      bottoken: "${TELEGRAM_BOT_TOKEN}"
      chatid: "${TELEGRAM_CREW_CHAT_ID}"  # Separate channel for crew
      parse_mode: "markdown"
    disableResolveMessage: false
    provenance: "api"

  - name: "Grafana Built-in Alerts"
    uid: "builtin"
    type: "grafana"
    disableResolveMessage: false
    provenance: "api"

---

apiVersion: 1

notificationPolicies:
  - orgName: "MidnightRider"
    groupByStr:
      - "alertname"
      - "instance"
      - "severity"
    policies:
      # Safety alerts (CRITICAL)
      - receiver: "Telegram - Denis"
        matchers:
          - name: "severity"
            value: "critical"
        repeat: "5m"
        groupInterval: "1m"
        groupWait: "10s"
        muteTimeIntervals: []
        
      # Racing alerts (WARNING)
      - receiver: "Telegram - Denis"
        matchers:
          - name: "category"
            value: "racing"
        repeat: "30s"
        groupInterval: "30s"
        groupWait: "5s"
        muteTimeIntervals: []

      # Weather alerts (WARNING)
      - receiver: "Telegram - Denis"
        matchers:
          - name: "category"
            value: "weather"
        repeat: "10m"
        groupInterval: "5m"
        groupWait: "1m"
        muteTimeIntervals: []

      # Navigation alerts (INFO)
      - receiver: "Grafana Built-in Alerts"
        matchers:
          - name: "severity"
            value: "info"
        repeat: "1h"
        groupInterval: "15m"
        groupWait: "5m"
        muteTimeIntervals: []

      # Default receiver
      - receiver: "Telegram - Denis"
        repeat: "4h"
        groupInterval: "30m"
        groupWait: "10s"
        muteTimeIntervals: []

---

# Telegram Integration Setup Instructions
# 
# 1. Create Telegram Bot:
#    - Open Telegram, chat with @BotFather
#    - Send: /newbot
#    - Follow prompts to create bot
#    - Copy bot token (something like: 123456789:ABCDefGHIjklmnoPQRstuvWXYZ)
#
# 2. Get Chat ID:
#    - Add bot to your chat/group
#    - Send message to bot: /start or any message
#    - Go to: https://api.telegram.org/bot<BOT_TOKEN>/getUpdates
#    - Look for "chat" → "id" field
#    - Copy this ID
#
# 3. Set Environment Variables:
#    export TELEGRAM_BOT_TOKEN="123456789:ABCDefGHIjklmnoPQRstuvWXYZ"
#    export TELEGRAM_CHAT_ID="YOUR_CHAT_ID"
#    export TELEGRAM_CREW_CHAT_ID="CREW_GROUP_ID"  # Optional
#
# 4. Restart Grafana:
#    sudo systemctl restart grafana-server
#
# 5. Configure in Grafana UI:
#    - Settings → Alerting → Contact Points
#    - Should see "Telegram - Denis" listed
#    - Test by clicking "Test" button
#

---

# Alert Message Templates (Custom)
#
# Safety Alerts:
#   Title: "🚨 CRITICAL: [AlertName]"
#   Body: "[Description] Immediate action required."
#
# Racing Alerts:
#   Title: "🏁 RACE: [AlertName]"
#   Body: "[Description] Time to start: HH:MM"
#
# Weather Alerts:
#   Title: "⛈️ WEATHER: [AlertName]"
#   Body: "[Description] Wind: X knots, Trend: [Graph link]"
#
# Navigation Alerts:
#   Title: "⚓ NAV: [AlertName]"
#   Body: "[Description] Current: [Value], Rate: [Trend]"
#

---

# Escalation Policy
#
# Level 1 - INFO (Dashboard highlights only):
#   - Tacking frequency
#   - Speed changes
#   - Heading corrections
#   Notification: Grafana UI panel color change
#   Repeat: No repeat (informational)
#
# Level 2 - WARNING (Telegram @ 30s repeat):
#   - Sunset approaching (2h)
#   - Distance to start line (< 300m)
#   - Pressure drops
#   Notification: Single Telegram message
#   Repeat: Every 30 seconds if still active
#
# Level 3 - CRITICAL (Telegram @ 1min repeat, immediate):
#   - Night in 30 minutes
#   - Race start in < 30 seconds
#   - Severe weather
#   Notification: Bold/Urgent Telegram message
#   Repeat: Every 1 minute if still active
#   Action: Optional page-on-demand for critical escalation
#

---

# Testing Alerts
#
# 1. Test Sunset Alert:
#    - Create test dashboard with sunset data < 120 min
#    - Alert should fire within 1 hour
#
# 2. Test Telegram Delivery:
#    - Configuration → Alerting → Contact Points
#    - Find "Telegram - Denis"
#    - Click "Test" (sends test message)
#
# 3. Monitor Active Alerts:
#    - Alerting → Alert Rules
#    - See list of active/firing alerts
#
# 4. View Alert History:
#    - Alerting → Alert History
#    - See past alerts, when they fired, resolution time
#
