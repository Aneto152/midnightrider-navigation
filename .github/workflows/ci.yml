name: CI — Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-python:
    name: Python Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./.git/*" -not -path "./archive/*" \
          | xargs python3 -m py_compile
          echo "✅ All Python files syntax OK"

  check-node:
    name: Node.js Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Check MCP server syntax
        run: |
          find ./mcp -name "*.js" \
          | xargs -I {} node --check {}
          echo "✅ All MCP server files syntax OK"

  check-secrets:
    name: No Secrets Leak
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Scan for exposed tokens
        run: |
          # Vérifier qu'aucun token réel n'est commité
          if grep -r "INFLUX_TOKEN=[^${\"]" . \
          --include="*.py" --include="*.js" \
          --include="*.md" --include="*.json" \
          --exclude-dir=.git --exclude-dir=archive; then
            echo "🔴 Token found in plain text!"
            exit 1
          fi
          echo "✅ No exposed tokens"
