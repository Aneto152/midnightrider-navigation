<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; overflow: hidden; }
        
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            color: #a0aec0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading dashboard...</p>
    </div>

    <script>
        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const dashboard = params.get('dashboard') || 'cockpit-main';
        const name = params.get('name') || 'Dashboard';

        // Get host from parameter (default to localhost)
        const host = params.get('host') || 'localhost';
        
        // Build direct Grafana URL (kiosk mode, no iframe needed)
        const grafanaUrl = `http://${host}:3001/d/${dashboard}?kiosk&refresh=5s`;
        
        console.log('Redirecting to:', grafanaUrl);

        // Redirect directly to Grafana (no iframe)
        window.location.href = grafanaUrl;
    </script>
</body>
</html>
